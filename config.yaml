# Weather Station Exporter Configuration

# Prometheus exporter settings
exporter:
  port: 9550

# RTL-433 radio settings
rtl433:
  frequency: "433.92M"
  protocol: 214

# Sensor configuration
sensor:
  model: "EMOS-E6016"
  # Map sensor IDs to location and expected channel
  sensors:
    104:
      location: "Living Room"
      channel: 1
    124:
      location: "Window"
      channel: 3
